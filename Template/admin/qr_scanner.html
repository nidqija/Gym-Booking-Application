<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titan Scanner | Mini View</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --onyx: #0F0F0F;
            --lime: #CCFF00;
            --concrete: #1E1E1E;
            --border-glow: rgba(204, 255, 0, 0.2);
        }

        body {
            background-color: var(--onyx);
            color: #E0E0E0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* The New Wrapper Container */
        .kiosk-container {
            width: 100%;
            max-width: 450px; /* Constrained width */
            background: var(--concrete);
            border: 1px solid #333;
            padding: 2rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .font-oswald { font-family: 'Oswald', sans-serif; text-transform: uppercase; }
        .text-lime { color: var(--lime) !important; }

        /* Compact Scanner Viewport */
        .scanner-viewport {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #000;
            border: 1px solid #444;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--lime);
            box-shadow: 0 0 15px var(--lime);
            top: 0;
            animation: scanMove 2.5s infinite ease-in-out;
            z-index: 5;
        }

        @keyframes scanMove {
            0%, 100% { top: 5%; }
            50% { top: 95%; }
        }

        /* Decorative Corners */
        .c-brk {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--lime);
            z-index: 6;
        }
        .tl { top: 15px; left: 15px; border-right: 0; border-bottom: 0; }
        .tr { top: 15px; right: 15px; border-left: 0; border-bottom: 0; }
        .bl { bottom: 15px; left: 15px; border-right: 0; border-top: 0; }
        .br { bottom: 15px; right: 15px; border-left: 0; border-top: 0; }

        /* Buttons & Inputs */
        .form-control-titan {
            background: #0a0a0a;
            border: 1px solid #333;
            color: white;
            border-radius: 0;
            font-size: 0.9rem;
        }

        .form-control-titan:focus {
            background: #000;
            border-color: var(--lime);
            box-shadow: 0 0 10px var(--border-glow);
            color: white;
        }

        .btn-titan {
            background: var(--lime);
            color: black;
            font-family: 'Oswald', sans-serif;
            border-radius: 0;
            font-weight: 700;
            border: none;
            transition: all 0.2s;
        }

        .btn-titan:hover {
            background: #fff;
            transform: translateY(-1px);
        }

        .status-badge {
            font-size: 0.65rem;
            letter-spacing: 1px;
            padding: 4px 8px;
            border: 1px solid #444;
        }
    </style>
</head>
<body>

    <div class="kiosk-container">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="font-oswald h4 mb-0">TITAN <span class="text-lime">SCAN</span></h2>
                <span class="status-badge text-secondary font-oswald">STATION_04</span>
            </div>
            <a href="#" class="text-secondary" title="Close Scanner"><i class="bi bi-x-lg"></i></a>
        </div>

        <!-- Scanner Box -->
        <div class="scanner-viewport" id="reader">
            <div class="scan-line"></div>
            <div class="c-brk tl"></div>
            <div class="c-brk tr"></div>
            <div class="c-brk bl"></div>
            <div class="c-brk br"></div>
            
            <div class="h-100 d-flex flex-column align-items-center justify-content-center opacity-25">
                <i class="bi bi-qr-code-scan fs-1 mb-2"></i>
                <p class="small font-oswald">Awaiting Signal...</p>
            </div>
        </div>

        <!-- Manual Entry Area -->
        <div class="mb-3">
            <label class="small text-secondary font-oswald mb-2">Manual Authentication</label>
            <div class="input-group">
                <input type="text" class="form-control form-control-titan" placeholder="ATHLETE ID">
                <button class="btn btn-titan px-3" hx-post="/verify">
                    <i class="bi bi-arrow-right"></i>
                </button>
            </div>
        </div>

        <!-- Mini Logs / Feedback -->
        <div id="scanner-output" class="pt-3 border-top border-secondary">
            <div class="d-flex align-items-center small">
                <div class="spinner-grow text-lime me-2" style="width: 8px; height: 8px;"></div>
                <span class="text-secondary">System ready for next scan...</span>
            </div>
        </div>
        
        <div class="mt-4 text-center">
            <button class="btn btn-link text-secondary text-decoration-none small font-oswald p-0" onclick="history.back()">
                <i class="bi bi-chevron-left"></i> Return to Dashboard
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const qrConfig = { fps: 10, qrbox: { width: 250, height: 250 } };

        html5QrCode.start(
            { facingMode: "environment" }, 
            qrConfig,
        async  (decodedText, decodedResult) => {
                // Handle successful scan
                console.log(`Decoded QR code: ${decodedText}`);
                document.getElementById('scanner-output').innerHTML = `
                    <div class="d-flex align-items-center small">
                        <i class="bi bi-check-circle-fill text-lime me-2"></i>
                        <span class="text-lime">Scan successful: ${decodedText}</span>
                    </div>
                `;

                // Process the scanned QR code data (e.g., send to server for check-in)
                const [bookingId, userId] = decodedText.split("|"); // Assuming QR code contains "bookingId|userId"
                await processCheckIn(bookingId, userId);
                
                // Optionally send the decoded text to the server for verification
                // Example: htmx.ajax('POST', '/verify', { values: { qr_data: decodedText } });
            },
            (errorMessage) => {
                // Handle scan failure (optional)
                console.warn(`QR code scan error: ${errorMessage}`);
            }
        ).catch(err => {
            console.error(`Unable to start scanning: ${err}`);
        });


        async function processCheckIn(bookingId , userId ){

            const payload = {
                reservation_id : bookingId,
                user_id :  userId, // This should be dynamically set based on the logged-in admin
                admin_secret : "super_secret_key", // This should be securely stored and validated on the server
                session_id : "current_session_id" // This should be generated per session for security
            }
            try {
                const response = await fetch('/admin/check-in', {
                   method: 'POST',
                   headers: {
                       'Content-Type': 'application/json'
                   },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                if(result.status === "success"){
                    alert("Check-in successful!");
                } else {
                    alert("Check-in failed: " + result.message);
                }
            }

            catch (error) {
                console.error("Error during check-in:", error);
                alert("An error occurred while processing the check-in. Please try again.");
            }
        }
        

        
    </script>
</body>
</html>
