<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titan Gym | Performance Reports</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --onyx: #1A1A1A;
            --lime: #CCFF00;
            --gym-red: #E63946;
            --concrete: #2D2D2D;
            --slate: #3d3d3d;
        }

        body {
            background-color: var(--onyx);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden; /* Prevent horizontal scroll */
        }

        h1, h2, h3, .nav-link {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bg-industrial {
            background: linear-gradient(135deg, #1a1a1a 25%, #222 25%, #222 50%, #1a1a1a 50%, #1a1a1a 75%, #222 75%, #222 100%);
            background-size: 40px 40px;
            opacity: 0.05;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        /* --- FIXES START HERE --- */
        
        .control-panel {
            background-color: var(--concrete);
            border-right: 2px solid var(--lime);
            padding: 30px;
            /* Using fixed width classes or styles for the sidebar */
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 1000;
            overflow-y: auto; /* Scrollable if settings are long */
        }

        /* Adjust main content to stay to the right of the fixed sidebar */
        main {
            padding-top: 2rem;
        }

        @media (min-width: 768px) {
            main {
                /* This ensures the content doesn't "slide under" or "jump down" */
                margin-left: 25%; /* Match the col-md-3 width */
            }
        }

        @media (min-width: 992px) {
            main {
                margin-left: 16.666667%; /* Match the col-lg-2 width */
            }
        }

        /* --- FIXES END HERE --- */

        .form-label { color: var(--lime); font-weight: 700; font-size: 0.8rem; text-transform: uppercase; }
        .form-control, .form-select { background-color: var(--onyx); border: 1px solid var(--slate); color: white; border-radius: 0; }
        .form-control:focus, .form-select:focus { background-color: #222; border-color: var(--lime); color: white; box-shadow: none; }
        .report-card { background-color: var(--concrete); border: none; border-top: 4px solid var(--lime); border-radius: 0; margin-bottom: 20px; }
        .btn-lime { background-color: var(--lime); color: black; font-weight: 800; border-radius: 0; border: none; text-transform: uppercase; }
        .btn-outline-lime { border: 2px solid var(--lime); color: var(--lime); border-radius: 0; text-transform: uppercase; font-weight: 700; }
        .btn-outline-lime:hover { background-color: var(--lime); color: black; }
        .table-titan { color: white; border-color: var(--slate); }
        .table-titan th { color: var(--lime); text-transform: uppercase; border-bottom: 2px solid var(--lime); }
        .stat-highlight { font-size: 2.5rem; font-family: 'Oswald'; color: var(--lime); }
        
        /* Dark mode calendar icon fix */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }
    </style>
</head>
<body>

    <div class="bg-industrial"></div>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar Controls -->
            <nav class="col-md-3 col-lg-2 d-md-block control-panel">
                <div class="mb-5">
                    <h3 class="text-lime"><i class="bi bi-bar-chart-fill me-2"></i>REPORTS</h3>
                </div>

                <form>
                    <div class="mb-4">
                        <label class="form-label">Report Type</label>
                        <select class="form-select">
                            <option>Member Attendance</option>
                            <option>Revenue Analytics</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Date Range</label>
                        <input type="date" class="form-control mb-2">
                        <input type="date" class="form-control">
                    </div>

                    <button type="button" class="btn btn-lime w-100 py-3">
                        <i class="bi bi-gear-wide-connected me-2"></i>Generate
                    </button>
                </form>
            </nav>

            <!-- Main Content Area -->
            <main class="col-md-9 col-lg-10 px-md-5">
                <header class="d-flex justify-content-between align-items-center mb-5 pb-3 border-bottom border-secondary">
                    <h1 class="display-5">Titan Analytics <span class="text-secondary fs-4">/ 2026 Q2</span></h1>
                    <button class="btn btn-outline-lime"><i class="bi bi-download me-2"></i>Export</button>
                </header>

                <div class="row mb-5">
                    <div class="col-md-4">
                        <div class="report-card card p-3">
                            <small class="text-secondary text-uppercase">Total Check-ins</small>
                            <div class="stat-highlight">1,284</div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="report-card card p-3">
                            <small class="text-secondary text-uppercase">Active Members</small>
                            <div class="stat-highlight">452</div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="report-card card p-3">
                            <small class="text-secondary text-uppercase">Revenue</small>
                            <div class="stat-highlight">$42.1K</div>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-12">
                        <div class="report-card card p-4">
                            <h3 class="h5 mb-4 text-white">Traffic Flow (Weekly)</h3>
                            <div style="height: 300px;">
                                <canvas id="trafficChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const ctxTraffic = document.getElementById('trafficChart').getContext('2d');
        new Chart(ctxTraffic, {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    label: 'Check-ins',
                    data: [120, 150, 180, 140, 210, 160, 90],
                    borderColor: '#CCFF00',
                    backgroundColor: 'rgba(204, 255, 0, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { grid: { color: '#333' }, ticks: { color: '#888' } },
                    x: { grid: { display: false }, ticks: { color: '#888' } }
                }
            }
        });
    </script>
</body>
</html>
